<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Campo Belo · São Paulo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700;0,6..96,800;1,6..96,600;1,6..96,700;1,6..96,800&family=Epilogue:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ── RESET & TOKENS ─────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --navy:       #1a3a5c;
  --navy-mid:   #2d5a8e;
  --navy-light: #e8f0f8;
  --gold:       #c9a84c;
  --gold-light: #f5efd4;
  --gold-dark:  #9a7a30;

  --bg:       #f3f4f7;
  --surface:  #fefefe;
  --surface2: #edf0f4;

  --text:   #0f1923;
  --text2:  #5a6678;
  --text3:  #9aa3b0;

  --green:  #22c55e;
  --border: rgba(0,0,0,0.07);

  --sh-xs: 0 1px 3px rgba(0,0,0,.06);
  --sh-sm: 0 2px 10px rgba(0,0,0,.07);
  --sh:    0 4px 20px rgba(0,0,0,.10);
  --sh-lg: 0 8px 32px rgba(0,0,0,.14);

  --r:  10px;
  --rs: 7px;

  --font:    'Epilogue', -apple-system, BlinkMacSystemFont, sans-serif;
  --display: 'Bodoni Moda', Georgia, serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ───────────────────────────────────── */
.hero {
  background: linear-gradient(165deg, #152f4a 0%, #0b1c2c 100%);
  padding: 16px 20px 32px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 85% 10%, rgba(201,168,76,.12) 0%, transparent 60%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; bottom: 0; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.35), transparent);
  pointer-events: none;
}

/* hero footer — instagram + clima lado a lado */
.hero-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 14px;
  position: relative; z-index: 1;
  flex-wrap: wrap;
}
.weather-widget {
  display: flex; align-items: center; gap: 3px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 99px;
  padding: 3px 8px;
  opacity: 0;
  transition: opacity .4s ease;
  flex-shrink: 0;
}
.weather-widget.loaded { opacity: 1; }
.weather-icon { font-size: 11px; line-height: 1; }
.weather-temp {
  font-size: 11px; font-weight: 700;
  color: #fff; letter-spacing: -.2px; white-space: nowrap;
}
.weather-sep {
  width: 1px; height: 9px;
  background: rgba(255,255,255,.2);
  flex-shrink: 0;
}
.weather-desc {
  font-size: 9px; font-weight: 500;
  color: rgba(255,255,255,.55);
  white-space: nowrap;
}

.hero-identity {
  display: flex; align-items: center; gap: 18px;
  margin-bottom: 16px; position: relative; z-index: 1;
}
.hero-logo {
  height: 80px; width: auto;
  object-fit: contain; flex-shrink: 0;
}
.hero-identity-text { display: flex; flex-direction: column; gap: 4px; }

/* instagram link no hero */
.hero-instagram {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 500;
  color: rgba(255,255,255,.55);
  text-decoration: none;
  letter-spacing: .05px;
  position: relative; z-index: 1;
}
.hero-instagram em {
  font-style: normal; font-weight: 700;
  color: var(--gold);
}
.hero-instagram:hover { color: rgba(255,255,255,.85); }
.hero-instagram:hover em { color: #e8c468; }
.hero-eyebrow {
  font-size: 9px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); opacity: .9;
  margin-bottom: 6px;
}
.hero h1 {
  font-family: var(--display);
  font-optical-sizing: auto;
  font-size: clamp(26px, 7.5vw, 38px); font-weight: 800;
  line-height: 1.04; letter-spacing: -.6px;
  color: #fff; margin-bottom: 6px;
}
.hero h1 em { font-style: italic; color: var(--gold); }
.hero-sub {
  font-size: 13px; color: rgba(255,255,255,.5);
  font-weight: 400; line-height: 1.6; letter-spacing: .15px;
  max-width: 58ch;
}

/* ── DESTAQUES CAROUSEL ──────────────────────── */
.destaques-section {
  padding: 20px 0 4px;
}
.destaques-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 10px;
}
.destaques-eyebrow {
  font-size: 9px; font-weight: 600;
  color: var(--text3); letter-spacing: 1.4px;
  text-transform: uppercase;
}
.destaques-track {
  display: flex;
  gap: 8px;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  scroll-padding-left: 20px;
  scrollbar-width: none;
  padding: 2px 20px 6px;
  -webkit-overflow-scrolling: touch;
  user-select: none;
}
.destaques-track::-webkit-scrollbar { display: none; }
@media (hover: hover) { .destaques-track { cursor: grab; } }

.destaque-card {
  flex-shrink: 0;
  width: 158px;
  height: 88px;
  border-radius: 9px;
  overflow: hidden;
  position: relative;
  scroll-snap-align: start;
  background-size: cover;
  background-position: center;
  background-color: var(--navy);
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,.14);
  transition: opacity .15s;
}
.destaque-card:active { opacity: .85; }

.destaque-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,.02) 0%,
    rgba(0,0,0,.0) 30%,
    rgba(0,0,0,.68) 100%
  );
}
.destaque-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px 10px 9px;
  z-index: 1;
}
.destaque-nome {
  font-family: var(--display);
  font-optical-sizing: auto;
  font-size: 11px; font-weight: 700;
  color: #fff; line-height: 1.2;
  text-shadow: 0 1px 5px rgba(0,0,0,.5);
  letter-spacing: -.1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.destaque-sub {
  font-size: 8.5px; font-weight: 500;
  color: rgba(255,255,255,.58);
  margin-top: 2px; letter-spacing: .15px;
}

@media (hover: hover) {
  .destaque-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.2); }
}

/* ── CATEGORY GRID ──────────────────────────── */
.section { padding: 0 16px 22px; }

.sec-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; padding-top: 24px;
}
.sec-title {
  font-family: var(--display);
  font-optical-sizing: auto;
  font-size: 18px; font-weight: 700; letter-spacing: -.2px;
  color: var(--text);
}
.sec-label {
  font-size: 9px; font-weight: 600;
  color: var(--text3); letter-spacing: 1.4px;
  text-transform: uppercase;
}
.sec-link {
  font-size: 11px; font-weight: 600;
  color: var(--navy); text-decoration: none;
  background: transparent;
  border: none;
  padding: 4px 0;
  letter-spacing: .2px;
  border-bottom: 1px solid rgba(26,58,92,.3);
}

.cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}
.cat-card {
  border-radius: 7px;
  overflow: hidden; cursor: pointer;
  position: relative;
  aspect-ratio: 1 / 1;
  background-size: cover;
  background-position: center;
  background-color: var(--navy);
  opacity: 0;
  transform: translateY(14px);
  transition: opacity .45s cubic-bezier(.22,1,.36,1),
              transform .45s cubic-bezier(.22,1,.36,1);
}
.cat-card.visible {
  opacity: 1;
  transform: translateY(0);
}
.cat-card:active { opacity: .85; }

.cat-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    180deg,
    rgba(8,16,28,.05) 0%,
    rgba(8,16,28,.0) 25%,
    rgba(8,16,28,.6) 60%,
    rgba(8,16,28,.92) 100%
  );
}
.cat-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 8px 9px;
  z-index: 1;
}
.cat-name {
  font-family: var(--display);
  font-optical-sizing: auto;
  font-style: italic;
  font-size: clamp(16px, 4.8vw, 22px); font-weight: 700; color: #fff;
  line-height: 1.1; margin-bottom: 1px;
  text-shadow: 0 1px 8px rgba(0,0,0,.9), 0 2px 16px rgba(0,0,0,.6);
  letter-spacing: -.2px;
}
.cat-count { display: none; }

@media (max-width: 600px) {
  .cat-name { font-size: 13px; }
  .cat-nome-longo .cat-content { padding-left: 3px; padding-right: 2px; }
  .cat-nome-longo .cat-name { letter-spacing: -.5px; }
}

/* ── FILTER TABS ────────────────────────────── */
.filter-bar {
  display: flex; gap: 7px;
  padding: 0 16px 16px;
  overflow-x: auto; scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  border-radius: 99px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  transition: all .15s;
  box-shadow: var(--sh-xs);
}
.filter-tab.active {
  background: var(--navy);
  border-color: var(--navy);
  color: #fff;
}
.filter-tab .tab-count {
  font-size: 10px; font-weight: 700;
  background: rgba(0,0,0,.1);
  border-radius: 99px;
  padding: 1px 6px;
}
.filter-tab.active .tab-count { background: rgba(255,255,255,.2); }

/* ── CARDS GRID ─────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 16px;
  margin-bottom: 22px;
}

.place-card {
  background: var(--surface);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--sh-sm);
  border: 1px solid var(--border);
  transition: transform .16s, box-shadow .16s;
  position: relative;
}
.place-card:active {
  transform: scale(0.97);
  box-shadow: var(--sh-xs);
}
.place-card.is-destaque {
  border-color: rgba(201,168,76,.4);
  box-shadow: var(--sh-sm), 0 0 0 1px rgba(201,168,76,.2);
}

.card-cat-bar {
  display: flex; align-items: flex-end;
  padding: 4px 10px;
  position: relative; overflow: hidden;
  justify-content: space-between;
}
.card-cat-em {
  font-size: 26px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.5));
  line-height: 1;
}
.card-sub-tag {
  font-size: 9px; font-weight: 700;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.25);
  color: rgba(255,255,255,.9);
  border-radius: 99px;
  padding: 2px 8px;
  letter-spacing: .3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 80px;
  backdrop-filter: blur(4px);
  align-self: flex-start;
  margin-top: 4px;
}
.card-dest-badge {
  position: absolute; top: 8px; left: 8px;
  background: var(--gold);
  color: #2d1a00;
  font-size: 8.5px; font-weight: 800;
  padding: 2px 8px; border-radius: 99px;
  letter-spacing: .3px;
  box-shadow: 0 2px 6px rgba(0,0,0,.3);
}

.card-body { padding: 10px 11px 12px; }
.card-name {
  font-size: 14px; font-weight: 700; line-height: 1.25;
  color: var(--text); margin-bottom: 5px;
}
.card-ticket {
  font-size: 11px; font-weight: 600;
  color: var(--gold-dark);
  margin-bottom: 4px;
}
.card-addr {
  font-size: 10.5px; color: var(--text3);
  font-weight: 400; line-height: 1.3;
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta {
  font-size: 10px; color: var(--text3); font-weight: 500;
  letter-spacing: .1px;
}

/* ── MAP SECTION ────────────────────────────── */
.map-section { padding: 0 16px 22px; }
.map-wrap {
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--sh);
  border: 1px solid var(--border);
  height: 280px;
}
#map { height: 280px; width: 100%; }

/* Leaflet overrides */
.leaflet-container { font-family: var(--font); }
.leaflet-popup-content-wrapper {
  border-radius: 12px;
  box-shadow: var(--sh);
  border: none;
}
.leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
.leaflet-popup-content strong { color: var(--navy); }
.leaflet-popup-content small { display: block; color: var(--text3); font-size: 11px; margin-top: 2px; }

.map-pin {
  width: 34px; height: 34px;
  background: var(--navy);
  border: 2.5px solid rgba(255,255,255,.4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,.45);
  transition: transform .15s;
}
.map-pin.pin-gold {
  background: var(--gold);
  border-color: #fff;
  box-shadow: 0 3px 10px rgba(201,168,76,.6);
}

/* ── MODAL ──────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.48);
  backdrop-filter: blur(6px);
  align-items: flex-end;
}
.modal-overlay.open { display: flex; }

.modal-sheet {
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  width: 100%; max-height: 88vh;
  display: flex; flex-direction: column;
  animation: up .26s cubic-bezier(.32,.72,0,1);
  overflow: hidden;
}
@keyframes up {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-handle {
  width: 32px; height: 4px;
  background: #DDE2E8; border-radius: 99px;
  margin: 10px auto 0; flex-shrink: 0;
}

.modal-header {
  height: 130px; position: relative;
  flex-shrink: 0;
}
.modal-header-bg {
  position: absolute; inset: 0;
}
.modal-header-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.65) 0%, rgba(0,0,0,.1) 100%);
}
.modal-close {
  position: absolute; top: 12px; right: 14px;
  width: 32px; height: 32px;
  background: rgba(0,0,0,.35); border: none;
  border-radius: 50%; color: #fff;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
  z-index: 2;
}
.modal-header-content {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 18px 14px;
  z-index: 2;
}
.modal-cat-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.3);
  border-radius: 99px; padding: 3px 10px;
  font-size: 10px; font-weight: 700; color: #fff;
  letter-spacing: .3px; margin-bottom: 5px;
  backdrop-filter: blur(4px);
}
.modal-name {
  font-family: var(--display);
  font-optical-sizing: auto;
  font-size: 22px; font-weight: 800; color: #fff;
  line-height: 1.1; letter-spacing: -.3px;
}

.modal-body {
  flex: 1; overflow-y: auto;
  padding: 16px 18px 24px;
}

.modal-dest-strip {
  background: linear-gradient(135deg, var(--gold-light), #fff8e6);
  border: 1px solid rgba(201,168,76,.35);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.modal-dest-icon { font-size: 20px; flex-shrink: 0; }
.modal-dest-text { font-size: 13px; font-weight: 600; color: var(--gold-dark); line-height: 1.3; }

.modal-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 16px;
}
.modal-cell {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px 12px;
}
.modal-cell.full { grid-column: span 2; }
.modal-cell-label {
  font-size: 9px; font-weight: 700;
  color: var(--text3); letter-spacing: .9px;
  text-transform: uppercase; margin-bottom: 4px;
}
.modal-cell-val {
  font-size: 13px; font-weight: 600; color: var(--text);
  line-height: 1.35;
}

.modal-actions {
  display: flex; gap: 8px; margin-top: 4px;
}
.modal-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px; border-radius: 12px;
  border: none; cursor: pointer;
  font-family: var(--font);
  font-size: 13px; font-weight: 700;
  transition: opacity .15s, transform .1s;
  text-decoration: none;
}
.modal-btn:active { opacity: .85; transform: scale(0.97); }
.btn-wp { background: #22c55e; color: #fff; }
.btn-ig { background: linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); color: #fff; }
.btn-disabled { background: var(--surface2); color: var(--text3); cursor: default; }

/* ── BOTTOM NAV ─────────────────────────────── */
.nav-bottom {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 8px 2px 6px;
  cursor: pointer; gap: 2px; transition: opacity .1s;
  text-decoration: none;
}
.nav-item:active { opacity: .6; }
.nav-icon {
  width: 30px; height: 30px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  transition: background .15s, color .15s;
}
.nav-item.active .nav-icon {
  background: var(--navy-light);
  color: var(--navy);
}
.nav-item > span { font-size: 9px; font-weight: 600; color: var(--text2); }
.nav-item.active > span { color: var(--navy); }

.pb { height: 72px; }

/* ── HOVER STATES (pointer devices only) ──── */
@media (hover: hover) {
  .place-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--sh);
  }
  .cat-card:hover {
    opacity: .9;
  }
  .filter-tab:hover:not(.active) {
    background: var(--navy-light);
    border-color: rgba(26,58,92,.2);
    color: var(--navy);
  }
  .sec-link:hover {
    color: var(--navy);
    border-bottom-color: var(--navy);
  }
  .modal-btn:not(.btn-disabled):hover {
    opacity: .88;
    transform: translateY(-1px);
  }
  .modal-close:hover {
    background: rgba(0,0,0,.55);
  }
}

/* ── FOCUS STYLES ───────────────────────────── */
:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
  border-radius: 6px;
}

/* ── MODAL (NON-DESTAQUE STRIP) ─────────────── */
.modal-dest-strip-plain {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.modal-dest-strip-plain .modal-dest-icon { font-size: 16px; flex-shrink: 0; }
.modal-dest-strip-plain .modal-dest-text { font-size: 13px; font-weight: 500; color: var(--text2); line-height: 1.3; }

/* ── REDUCED MOTION ─────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-identity">
    <img src="logo.PNG" alt="Guia Campo Belo" class="hero-logo">
    <div class="hero-identity-text">
      <p class="hero-eyebrow">São Paulo · Campo Belo</p>
      <h1>Guia <em>Campo Belo</em></h1>
      <p class="hero-sub">Os melhores lugares do bairro, promoções e descontos exclusivos.</p>
    </div>

const UNSPLASH = (id) =>
  `https://images.unsplash.com/${id}?w=400&h=600&fit=crop&q=80`;

function isDestaque(d) { return d.par === "Alto" || d.par === "Altíssimo"; }

/* ── CATEGORY GRID (fotos) ─────────────────── */
function buildCatGrid() {
  const counts = {};
  dados.forEach(d => d.cats.forEach(c => { counts[c] = (counts[c] || 0) + 1; }));
  const grid = document.getElementById('catGrid');
  grid.innerHTML = Object.keys(CAT_META).map(cat => {
    const m = CAT_META[cat];
    const n = counts[cat] || 0;
    const longName = ['Restaurantes','Hamburguerias','Culinária Internacional'].includes(cat);
    return `<div class="cat-card${longName ? ' cat-nome-longo' : ''}"
        style="background-image:url(${UNSPLASH(m.img)})"
        onclick="setFilter('${cat}')"
        role="button" tabindex="0"
        aria-label="Filtrar por ${cat}"
        onkeydown="if(event.key==='Enter'||event.key===' ')setFilter('${cat}')">
      <div class="cat-img-overlay" aria-hidden="true"></div>
      <div class="cat-content">
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${n} lugar${n !== 1 ? 'es' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

/* ── FILTER TABS ────────────────────────────── */
let activeFilter = 'Todos';

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  const counts = { Todos: dados.length };
  dados.forEach(d => d.cats.forEach(c => { counts[c] = (counts[c] || 0) + 1; }));
  const tabs = ['Todos', ...Object.keys(CAT_META)];
  bar.innerHTML = tabs.map(c => {
    const n = counts[c] || 0;
    return `<div class="filter-tab${c === activeFilter ? ' active' : ''}"
      onclick="setFilter('${c}')"
      role="button" tabindex="0"
      aria-pressed="${c === activeFilter}"
      onkeydown="if(event.key==='Enter'||event.key===' ')setFilter('${c}')">
      ${CAT_META[c] ? `<span aria-hidden="true">${CAT_META[c].em}</span> ` : ''}${c}
      <span class="tab-count" aria-label="${n} lugares">${n}</span>
    </div>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  buildFilterBar();
  renderCards();
  window.scrollTo({ top: document.getElementById('filterBar').offsetTop - 60, behavior: 'smooth' });
}

/* ── CARDS ──────────────────────────────────── */
function renderCards() {
  const filtered = activeFilter === 'Todos'
    ? dados
    : dados.filter(d => d.cats.includes(activeFilter));
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = filtered.map(d => {
    const primaryCat = d.cats[0];
    const m = CAT_META[primaryCat] || {};
    const hl = isDestaque(d);
    return `<div class="place-card${hl ? ' is-destaque' : ''}" onclick="openModal(${d.id})" role="button" tabindex="0" aria-label="${d.nome}" onkeydown="if(event.key==='Enter'||event.key===' ')openModal(${d.id})">
      <div class="card-cat-bar" style="background:${m.color || '#1a3a5c'}">
        <span class="card-sub-tag">${d.sub}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${d.nome}</div>
        ${d.ticket ? `<div class="card-ticket">${d.ticket}</div>` : ''}
        ${d.end ? `<div class="card-addr">${d.end.split(',')[0]}</div>` : ''}
        ${d.obs ? `<div class="card-meta">${d.obs}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── MAP ────────────────────────────────────── */
let map, markers = [];

function initMap() {
  map = L.map('map', { zoomControl: true, scrollWheelZoom: false }).setView([-23.6208, -46.6675], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19
  }).addTo(map);
  buildMapMarkers(dados);
}

function buildMapMarkers(list) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  // Deduplicate by id so establishments in multiple categories only get one pin
  const seen = new Set();
  list.forEach(d => {
    if (seen.has(d.id)) return;
    seen.add(d.id);
    const hl = isDestaque(d);
    const em = CAT_META[d.cats[0]]?.em || '📍';
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-pin${hl ? ' pin-gold' : ''}">${em}</div>`,
      iconSize: [34, 34],
      iconAnchor: [17, 17],
      popupAnchor: [0, -20]
    });
    const m = L.marker([d.lat, d.lng], { icon })
      .addTo(map)
      .bindPopup(`<strong>${d.nome}</strong><small>${d.cats.join(' · ')}</small>${d.end ? `<small>📍 ${d.end}</small>` : ''}`)
      .on('click', () => openModal(d.id));
    markers.push(m);
  });
  document.getElementById('mapCount').textContent = `${seen.size} lugares`;
}

/* ── MODAL ──────────────────────────────────── */
function openModal(id) {
  const d = dados.find(x => x.id === id);
  if (!d) return;
  const primaryCat = d.cats[0];
  const m = CAT_META[primaryCat] || {};
  const hl = isDestaque(d);

  document.getElementById('modalHeaderBg').style.background = m.color || '#1a3a5c';
  document.getElementById('modalCatPill').innerHTML = d.cats.join(' · ');
  document.getElementById('modalName').textContent = d.nome;

  const body = document.getElementById('modalBody');

  const destRow = hl
    ? `<div class="modal-dest-strip">
        <div class="modal-dest-icon" aria-hidden="true">★</div>
        <div class="modal-dest-text">${d.dest}</div>
       </div>`
    : (d.dest
        ? `<div class="modal-dest-strip-plain">
            <div class="modal-dest-icon" aria-hidden="true">${m.em||'·'}</div>
            <div class="modal-dest-text">${d.dest}</div>
           </div>`
        : '');

  const cells = [
    d.desc ? `<div class="modal-cell full"><div class="modal-cell-label">Descrição</div><div class="modal-cell-val">${d.desc}</div></div>` : '',
    d.ticket ? `<div class="modal-cell"><div class="modal-cell-label">Ticket médio</div><div class="modal-cell-val">${d.ticket}</div></div>` : '',
    d.end ? `<div class="modal-cell full"><div class="modal-cell-label">Endereço</div><div class="modal-cell-val">${d.end}, Campo Belo — SP</div></div>` : '',
    `<div class="modal-cell full"><div class="modal-cell-label">Cupom de desconto</div><div class="modal-cell-val">—</div></div>`,
  ].join('');

  const wpHref = d.wp ? `https://wa.me/55${d.wp.replace(/\D/g,'')}` : '';
  const igHref = d.ig ? `https://instagram.com/${d.ig.replace('@','')}` : '';

  const actions = `<div class="modal-actions">
    ${d.wp ? `<a class="modal-btn btn-wp" href="${wpHref}" target="_blank" rel="noopener">WhatsApp</a>`
            : `<div class="modal-btn btn-disabled" aria-disabled="true">WhatsApp</div>`}
    ${d.ig ? `<a class="modal-btn btn-ig" href="${igHref}" target="_blank" rel="noopener">Instagram</a>`
            : `<div class="modal-btn btn-disabled" aria-disabled="true">Instagram</div>`}
  </div>`;

  body.innerHTML = destRow + `<div class="modal-grid">${cells}</div>` + actions;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function scrollToMap() {
  document.querySelector('.map-section').scrollIntoView({ behavior: 'smooth' });
}

/* ── KEYBOARD: close modal on Escape ─── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) {
    closeModal();
  }
});

/* ── DESTAQUES CAROUSEL ──────────────────────── */
function buildDestaqueCarousel() {
  const track = document.getElementById('destaqueTrack');
  if (!track) return;

  // ── Fotos disponíveis na pasta 'fotos destaques/'
  // • file: nome do arquivo
  // • displayName (opcional): nome a exibir se não houver match nos dados
  //   Se houver match automático, displayName é ignorado e usa dados.nome
  const DESTAQUE_FILES = [
    { file: 'live.JPG' },
    { file: 'deliciasdocampobelo.jpg', displayName: 'Delícias do Campo Belo' },
  ];

  // Normaliza: minúsculo, sem acento, sem chars especiais
  function norm(s) {
    return s.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]/g, '');
  }

  // Tenta match bidirecional: stem contém o nome OU nome contém o stem (mín. 3 chars)
  function findMatch(stem) {
    if (stem.length < 3) return null;
    return dados.find(d => {
      const n = norm(d.nome);
      return n.includes(stem) || stem.includes(n);
    }) || null;
  }

  const items = DESTAQUE_FILES.map(({ file, displayName }) => {
    const stem  = norm(file.replace(/\.[^.]+$/, ''));
    const match = findMatch(stem);
    return {
      id:          match ? match.id : null,
      photo:       `fotos destaques/${file}`,
      displayName: match ? null : (displayName || stem),
    };
  });

  if (items.length === 0) {
    track.closest('.destaques-section').style.display = 'none';
    return;
  }

  track.innerHTML = items.map(item => {
    const d    = item.id ? dados.find(x => x.id === item.id) : null;
    const nome = d ? d.nome : (item.displayName || '');
    const sub  = d ? d.sub  : '';
    const photo = encodeURI(item.photo);
    const clickable = !!item.id;

    return `<div class="destaque-card" style="background-image:url('${photo}')"
      ${clickable
        ? `onclick="openModal(${item.id})" role="listitem button" tabindex="0" aria-label="${nome}" onkeydown="if(event.key==='Enter'||event.key===' ')openModal(${item.id})"`
        : `role="listitem" aria-label="${nome}"`}>
      <div class="destaque-overlay" aria-hidden="true"></div>
      <div class="destaque-info">
        <div class="destaque-nome">${nome}</div>
        ${sub ? `<div class="destaque-sub">${sub}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  /* ── Auto-advance ── */
  const CARD_W = 158 + 8; // card + gap
  let idx = 0;
  let autoTimer = null;

  function scrollTo(i) {
    track.scrollTo({ left: i * CARD_W, behavior: 'smooth' });
  }

  function advance() {
    idx = (idx + 1) % items.length;
    if (idx === 0) {
      track.scrollTo({ left: 0, behavior: 'instant' });
    } else {
      scrollTo(idx);
    }
  }

  function startAuto() {
    stopAuto();
    autoTimer = setInterval(advance, 4000);
  }

  function stopAuto() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  }

  /* Touch — browser handles drag natively; we just pause/resume */
  track.addEventListener('touchstart', stopAuto, { passive: true });
  track.addEventListener('touchend', () => {
    setTimeout(() => {
      idx = Math.round(track.scrollLeft / CARD_W);
      startAuto();
    }, 600);
  }, { passive: true });

  /* Mouse drag (desktop) */
  let isDown = false, startX = 0, startScroll = 0;
  track.addEventListener('mousedown', e => {
    isDown = true; stopAuto();
    startX = e.pageX; startScroll = track.scrollLeft;
    track.style.cursor = 'grabbing';
  });
  track.addEventListener('mousemove', e => {
    if (!isDown) return;
    track.scrollLeft = startScroll - (e.pageX - startX);
  });
  ['mouseup', 'mouseleave'].forEach(ev => {
    track.addEventListener(ev, () => {
      if (!isDown) return;
      isDown = false;
      track.style.cursor = 'grab';
      idx = Math.round(track.scrollLeft / CARD_W);
      startAuto();
    });
  });

  /* Hover pause */
  track.addEventListener('mouseenter', () => { if (!isDown) stopAuto(); });
  track.addEventListener('mouseleave', () => { if (!isDown) startAuto(); });

  startAuto();
}

/* ── SCROLL ANIMATION — category cards ──────── */
function initCatAnimations() {
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) {
    document.querySelectorAll('.cat-card').forEach(el => el.classList.add('visible'));
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.cat-card').forEach((el, i) => {
    el.style.transitionDelay = `${i * 42}ms`;
    observer.observe(el);
  });
}

/* ── WEATHER WIDGET ─────────────────────────── */
async function loadWeather() {
  // AbortController com fallback manual (AbortSignal.timeout não é universal)
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 6000);

  try {
    const res = await fetch(
      'https://wttr.in/Campo+Belo,SP?format=j1',
      { signal: ctrl.signal }
    );
    clearTimeout(timer);
    if (!res.ok) return;

    const data = await res.json();
    const cc    = data.current_condition[0];
    const today = data.weather[0];
    const temp  = cc.temp_C + '°';
    const code  = parseInt(cc.weatherCode, 10);
    const maxT  = today.maxtempC + '°';
    const minT  = today.mintempC + '°';
    const rainChance = Math.max(...today.hourly.map(h => parseInt(h.chanceofrain, 10)));
    const willRain   = rainChance > 40;

    // Mapeamento de weatherCode → emoji
    const icon =
      code === 113                          ? '☀️'  :
      code === 116                          ? '⛅'  :
      code === 119 || code === 122          ? '☁️'  :
      code === 143 || code === 248 || code === 260 ? '🌫️' :
      code === 200 || code >= 386           ? '⛈️'  :
      code >= 263 && code <= 308            ? '🌧️'  :
      code >= 311 && code <= 338            ? '🌨️'  :
      code >= 353 && code <= 381            ? '🌦️'  : '🌤️';

    // Previsão compacta: ↑max ↓min (+ ícone de chuva se vai chover)
    const forecast = (willRain ? '🌧 ' : '') + '↑' + maxT + ' ↓' + minT;

    document.getElementById('weatherIcon').textContent = icon;
    document.getElementById('weatherTemp').textContent = temp;
    document.getElementById('weatherDesc').textContent = forecast;
    document.getElementById('weatherWidget').classList.add('loaded');
  } catch {
    clearTimeout(timer);
    // Fallback: tenta URL sugerida como texto simples
    try {
      const r = await fetch('https://wttr.in/Campo+Belo?format=%c+%t');
      if (!r.ok) return;
      const txt = (await r.text()).trim();
      const sp  = txt.indexOf(' ');
      if (sp === -1) return;
      const icon = txt.slice(0, sp);
      const temp = txt.slice(sp + 1).replace(/^\+/, '');
      if (!temp) return;
      document.getElementById('weatherIcon').textContent = icon;
      document.getElementById('weatherTemp').textContent = temp;
      document.getElementById('weatherWidget').classList.add('loaded');
    } catch { /* widget permanece oculto */ }
  }
}

/* ── INIT ───────────────────────────────────── */
buildDestaqueCarousel();
buildCatGrid();
buildFilterBar();
renderCards();
initMap();
initCatAnimations();
loadWeather();
